<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Research Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #252525;
            --accent: #20b8cd;
            --accent-hover: #1a9bb0;
            --text-primary: #efefef;
            --text-secondary: #b4b4b4;
            --border: #2a2a2a;
            --success: #4ade80;
            --warning: #fbbf24;
            --error: #f87171;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #9333ea);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 1.2rem;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Main Container */
        .container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem;
            flex: 1;
        }

        /* Search Section */
        .search-section {
            margin-bottom: 2rem;
        }

        .search-box {
            position: relative;
            margin-bottom: 1rem;
        }

        #query {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        #query:focus {
            border-color: var(--accent);
            background: var(--bg-tertiary);
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        #searchBtn {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        #searchBtn:hover:not(:disabled) {
            background: var(--accent-hover);
        }

        #searchBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Status Bar */
        .status {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .status.loading {
            display: flex;
            background: rgba(32, 184, 205, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .status.success {
            display: flex;
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .status.error {
            display: flex;
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Results Section */
        .results {
            display: none;
        }

        .results.show {
            display: block;
        }

        /* Answer Card */
        .answer-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .answer-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .answer-content {
            line-height: 1.7;
            color: var(--text-primary);
        }

        .answer-content h2, .answer-content h3 {
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
        }

        .answer-content ul, .answer-content ol {
            margin: 1rem 0 1rem 1.5rem;
        }

        .answer-content li {
            margin: 0.5rem 0;
        }

        .answer-content p {
            margin: 1rem 0;
        }

        /* Validation Badge */
        .validation-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 1rem;
        }

        .validation-badge.incomplete {
            background: rgba(251, 191, 36, 0.1);
            border-color: var(--warning);
            color: var(--warning);
        }

        /* Fact Check Card */
        .fact-check-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .fact-check-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .fact-check-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        .accuracy-score {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .accuracy-score.warning {
            background: rgba(251, 191, 36, 0.1);
            border-color: var(--warning);
            color: var(--warning);
        }

        .accuracy-score.error {
            background: rgba(248, 113, 113, 0.1);
            border-color: var(--error);
            color: var(--error);
        }

        .fact-issues {
            margin-top: 1rem;
        }

        .issue-item {
            padding: 0.75rem;
            background: var(--bg-tertiary);
            border-radius: 8px;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* Sources Section */
        .sources-section {
            margin-top: 2rem;
        }

        .sources-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sources-grid {
            display: grid;
            gap: 1rem;
        }

        .source-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        .source-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .source-header {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .source-number {
            min-width: 28px;
            height: 28px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--accent);
        }

        .source-title {
            flex: 1;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .source-url {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin: 0.5rem 0;
            text-decoration: none;
            display: block;
            word-break: break-all;
        }

        .source-url:hover {
            color: var(--accent);
        }

        .source-summary {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-top: 0.75rem;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            header {
                padding: 1rem;
            }

            .answer-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">🔍</div>
        <h1>AI Research Assistant</h1>
    </header>

    <div class="container">
        <div class="search-section">
            <div class="search-box">
                <span class="search-icon">🔎</span>
                <input 
                    type="text" 
                    id="query" 
                    placeholder="Ask anything... e.g., 'What is quantum computing?'"
                    autofocus
                />
            </div>
            <button id="searchBtn">Search</button>
        </div>

        <div id="status" class="status"></div>

        <div id="results" class="results">
            <!-- Results will be inserted here -->
        </div>
    </div>

    <footer>
        Powered by Ollama AI • Three-Phase Pipeline: Research → Validation → Fact-Check
    </footer>

    <script>
        const queryInput = document.getElementById('query');
        const searchBtn = document.getElementById('searchBtn');
        const statusDiv = document.getElementById('status');
        const resultsDiv = document.getElementById('results');

        // Enter key to search
        queryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                search();
            }
        });

        searchBtn.addEventListener('click', search);

        async function search() {
            const query = queryInput.value.trim();
            
            if (!query) {
                showStatus('error', '⚠️ Please enter a question');
                return;
            }

            // Reset UI
            resultsDiv.classList.remove('show');
            resultsDiv.innerHTML = '';
            searchBtn.disabled = true;

            showStatus('loading', 'Researching your question...');

            try {
                const response = await fetch('http://localhost:8000/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ query })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                displayResults(data);
                showStatus('success', '✅ Research complete!');
                setTimeout(() => hideStatus(), 3000);

            } catch (error) {
                console.error('Search error:', error);
                showStatus('error', `❌ Error: ${error.message}`);
            } finally {
                searchBtn.disabled = false;
            }
        }

        function showStatus(type, message) {
            statusDiv.className = `status ${type}`;
            statusDiv.innerHTML = type === 'loading' 
                ? `<div class="spinner"></div><span>${message}</span>`
                : `<span>${message}</span>`;
        }

        function hideStatus() {
            statusDiv.className = 'status';
        }

        function displayResults(data) {
            resultsDiv.innerHTML = '';

            // Answer Section
            const answerCard = document.createElement('div');
            answerCard.className = 'answer-card';
            
            const answerHeader = document.createElement('div');
            answerHeader.className = 'answer-header';
            answerHeader.textContent = '📊 Answer';
            
            const answerContent = document.createElement('div');
            answerContent.className = 'answer-content';
            answerContent.innerHTML = formatAnswer(data.answer);

            // Validation Badge
            if (data.validation) {
                const validationBadge = document.createElement('div');
                validationBadge.className = data.validation.complete 
                    ? 'validation-badge' 
                    : 'validation-badge incomplete';
                validationBadge.innerHTML = data.validation.complete
                    ? '✅ Complete Coverage'
                    : `⚠️ Missing: ${data.validation.missing_topics?.join(', ') || 'N/A'}`;
                answerContent.appendChild(validationBadge);
            }

            answerCard.appendChild(answerHeader);
            answerCard.appendChild(answerContent);
            resultsDiv.appendChild(answerCard);

            // Fact Check Section
            if (data.fact_check) {
                const factCheckCard = createFactCheckCard(data.fact_check);
                resultsDiv.appendChild(factCheckCard);
            }

            // Sources Section
            if (data.sources && data.sources.length > 0) {
                const sourcesSection = document.createElement('div');
                sourcesSection.className = 'sources-section';

                const sourcesHeader = document.createElement('div');
                sourcesHeader.className = 'sources-header';
                sourcesHeader.textContent = `📚 Sources (${data.sources.length})`;

                const sourcesGrid = document.createElement('div');
                sourcesGrid.className = 'sources-grid';

                data.sources.forEach((source, index) => {
                    const sourceCard = createSourceCard(source, index + 1);
                    sourcesGrid.appendChild(sourceCard);
                });

                sourcesSection.appendChild(sourcesHeader);
                sourcesSection.appendChild(sourcesGrid);
                resultsDiv.appendChild(sourcesSection);
            }

            resultsDiv.classList.add('show');
        }

        function createFactCheckCard(factCheck) {
            const card = document.createElement('div');
            card.className = 'fact-check-card';

            const header = document.createElement('div');
            header.className = 'fact-check-header';

            const title = document.createElement('div');
            title.className = 'fact-check-title';
            title.textContent = '🔬 Fact Check';

            const score = document.createElement('div');
            const scoreValue = factCheck.accuracy_score || 0;
            score.className = `accuracy-score ${
                scoreValue >= 90 ? '' : 
                scoreValue >= 70 ? 'warning' : 
                'error'
            }`;
            score.innerHTML = `${getVerdictEmoji(factCheck.verdict)} ${scoreValue}/100`;

            header.appendChild(title);
            header.appendChild(score);
            card.appendChild(header);

            // Show issues if any
            const hasIssues = 
                (factCheck.unsupported_claims && factCheck.unsupported_claims.length > 0) ||
                (factCheck.contradicted_claims && factCheck.contradicted_claims.length > 0) ||
                (factCheck.issues && factCheck.issues.length > 0);

            if (hasIssues) {
                const issuesDiv = document.createElement('div');
                issuesDiv.className = 'fact-issues';

                if (factCheck.unsupported_claims && factCheck.unsupported_claims.length > 0) {
                    const unsupportedDiv = document.createElement('div');
                    unsupportedDiv.className = 'issue-item';
                    unsupportedDiv.innerHTML = `<strong>⚠️ Unsupported claims:</strong> ${factCheck.unsupported_claims.join(', ')}`;
                    issuesDiv.appendChild(unsupportedDiv);
                }

                if (factCheck.contradicted_claims && factCheck.contradicted_claims.length > 0) {
                    const contradictedDiv = document.createElement('div');
                    contradictedDiv.className = 'issue-item';
                    contradictedDiv.innerHTML = `<strong>❌ Contradicted:</strong> ${factCheck.contradicted_claims.join(', ')}`;
                    issuesDiv.appendChild(contradictedDiv);
                }

                if (factCheck.issues && factCheck.issues.length > 0) {
                    const issuesListDiv = document.createElement('div');
                    issuesListDiv.className = 'issue-item';
                    issuesListDiv.innerHTML = `<strong>📝 Issues:</strong> ${factCheck.issues.join(', ')}`;
                    issuesDiv.appendChild(issuesListDiv);
                }

                card.appendChild(issuesDiv);
            }

            return card;
        }

        function getVerdictEmoji(verdict) {
            const emojis = {
                'accurate': '✅',
                'mostly_accurate': '✓',
                'partially_accurate': '⚠️',
                'inaccurate': '❌',
                'unknown': '❓'
            };
            return emojis[verdict] || '❓';
        }

        function createSourceCard(source, number) {
            const card = document.createElement('div');
            card.className = 'source-card';
            card.onclick = () => window.open(source.url, '_blank');

            const header = document.createElement('div');
            header.className = 'source-header';

            const sourceNumber = document.createElement('div');
            sourceNumber.className = 'source-number';
            sourceNumber.textContent = number;

            const title = document.createElement('div');
            title.className = 'source-title';
            title.textContent = source.title || 'Untitled';

            header.appendChild(sourceNumber);
            header.appendChild(title);

            const url = document.createElement('a');
            url.className = 'source-url';
            url.href = source.url;
            url.textContent = new URL(source.url).hostname;
            url.onclick = (e) => e.stopPropagation();

            const summary = document.createElement('div');
            summary.className = 'source-summary';
            summary.textContent = truncate(source.summary || '', 150);

            card.appendChild(header);
            card.appendChild(url);
            card.appendChild(summary);

            return card;
        }

        function formatAnswer(text) {
            if (!text) return '';
            
            // Convert markdown-style formatting to HTML
            return text
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>')
                .replace(/^/, '<p>')
                .replace(/$/, '</p>');
        }

        function truncate(text, length) {
            return text.length > length ? text.substring(0, length) + '...' : text;
        }
    </script>
</body>
</html>
